<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="description" content="JavaScriptで動作する軽量なReversi（オセロ）ゲーム">
    <title>JavaScript REVERSI - モダン版</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-wrapper">
        <main class="game-container">
            <header class="game-header">
                <h1>JavaScript REVERSI</h1>
                <p class="subtitle">モダンJavaScript版</p>
            </header>

            <!-- ゲームボード -->
            <section class="game-board">
                <div class="board-grid" id="boardGrid">
                    <!-- ボタンは JavaScript で動的に生成される -->
                </div>
            </section>

            <!-- ステータス表示 -->
            <section class="game-status">
                <div id="statusMessage" class="status-message">開始ボタンを押してください。</div>
            </section>

            <!-- ゲームコントロール -->
            <section class="game-controls">
                <div class="control-group">
                    <fieldset>
                        <legend>プレイヤー選択</legend>
                        <div class="radio-group">
                            <label>
                                <input type="radio" name="playerColor" value="BLACK" checked>
                                先行：黒
                            </label>
                            <label>
                                <input type="radio" name="playerColor" value="WHITE">
                                後攻：白
                            </label>
                        </div>
                    </fieldset>

                    <fieldset>
                        <legend>表示設定</legend>
                        <div class="checkbox-group">
                            <label>
                                <input type="checkbox" id="showLegalMoves" checked>
                                着手可能手を表示
                            </label>
                        </div>
                    </fieldset>

                    <fieldset>
                        <legend>難易度</legend>
                        <select id="difficultyLevel">
                            <option value="0">【難易度：低】ランダムに指す</option>
                            <option value="1" selected>【難易度：中】擬似作者</option>
                            <option value="2">【難易度：高】試験中</option>
                        </select>
                    </fieldset>
                </div>

                <div class="button-group">
                    <button id="startBtn" class="btn btn-primary">開始</button>
                    <button id="resetBtn" class="btn btn-secondary">リセット</button>
                </div>
            </section>

            <!-- ゲーム情報 -->
            <section class="game-info">
                <div class="info-item">
                    <span class="info-label">黒：</span>
                    <span id="blackCount" class="info-value">2</span>
                </div>
                <div class="info-item">
                    <span class="info-label">白：</span>
                    <span id="whiteCount" class="info-value">2</span>
                </div>
                <div class="info-item">
                    <span class="info-label">手数：</span>
                    <span id="moveCount" class="info-value">0</span>
                </div>
            </section>
        </main>
    </div>

    <!-- スクリプト読み込み -->
    <script src="reversi.js"></script>
    <script>
        // ゲームの初期化
        const game = new ReversiGame();
        game.initializeUI();
    </script>
</body>
</html>
