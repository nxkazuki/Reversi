<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript REVERSI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-wrapper">
        <div class="game-container">
            <header class="game-header">
                <h1>JavaScript REVERSI</h1>
                <div class="subtitle">AI & Opening Book Integrated</div>
            </header>

            <div class="game-board">
                <div id="boardGrid" class="board-grid">
                    <!-- Javascript generates 64 cells here -->
                </div>
            </div>

            <div class="game-status">
                <div id="statusMessage" class="status-message">開始ボタンを押してください。</div>
            </div>

            <div class="game-controls">
                <form id="gameConfigForm" onsubmit="return false;">
                    <!-- index.html の gameConfigForm 内、control-group を以下に置き換え -->
                    <div class="control-group">
                        <fieldset>
                            <legend>アシスト表示</legend>
                            <div class="checkbox-group">
                                <label>
                                    <input type="checkbox" id="showLegalMoves" checked>
                                    着手可能手を表示
                                </label>
                                <label>
                                    <input type="checkbox" id="showAIHint" checked>
                                    AIのおすすめ手（ヒント）を表示
                                </label>
                            </div>
                        </fieldset>

                        <fieldset>
                            <legend>自分の石の色</legend>
                            <div class="radio-group">
                                <label>
                                    <input type="radio" name="playerColor" value="BLACK" checked>
                                    先行：黒
                                </label>
                                <label>
                                    <input type="radio" name="playerColor" value="WHITE">
                                    後攻：白
                                </label>
                            </div>
                        </fieldset>

                        <select id="difficultyLevel">
                            <option value="0">【難易度：低】ランダムに指す</option>
                            <option value="1">【難易度：中】評価テーブル読み</option>
                            <option value="2" selected>【難易度：高】定石＋先読みAI</option>
                        </select>
                    </div>

                    <div class="button-group">
                        <button type="button" id="startBtn" class="btn btn-primary">開始</button>
                        <button type="button" id="resetBtn" class="btn btn-secondary">リセット</button>
                    </div>
                </form>
            </div>

            <div class="game-info">
                <div class="info-item">
                    <span class="info-label">手数</span>
                    <span id="moveCount" class="info-value">0</span>
                </div>
                <div class="info-item">
                    <span class="info-label">黒 (BLACK)</span>
                    <span id="blackCount" class="info-value">2</span>
                </div>
                <div class="info-item">
                    <span class="info-label">白 (WHITE)</span>
                    <span id="whiteCount" class="info-value">2</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Script files -->
    <script src="joseki.js"></script>
    <script src="reversi.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const game = new ReversiGame();
            game.initializeUI();
        });
    </script>
</body>
</html>
